name: Linux AppImage

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  appimage:
    name: Build AppImage (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            fuse_package: libfuse2
            serial_package: libqt6serialport6-dev
          - os: ubuntu-24.04
            fuse_package: libfuse2t64
            serial_package: qt6-serialport-dev

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            desktop-file-utils \
            ${{ matrix.fuse_package }} \
            libgl-dev \
            libusb-1.0-0-dev \
            patchelf \
            qmake6 \
            ${{ matrix.serial_package }} \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-connectivity-dev \
            qt6-tools-dev-tools

      - name: Build release binary
        run: |
          qmake6 AntScope.pro CONFIG+=release
          make -j"$(nproc)"

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/64x64/apps

          cp build/release/AntScope2 AppDir/usr/bin/AntScope2
          cp cables.txt AppDir/usr/
          cp itu-regions.txt AppDir/usr/
          cp itu-regions-defaults.txt AppDir/usr/
          cp QtLanguage_ja.qm AppDir/usr/
          cp QtLanguage_uk.qm AppDir/usr/
          cp AntScope2.png AppDir/usr/share/icons/hicolor/64x64/apps/antscope2.png

          cat > AppDir/usr/share/applications/antscope2.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=AntScope2
          Exec=AntScope2
          Icon=antscope2
          Categories=Science;
          Terminal=false
          EOF

          desktop-file-validate AppDir/usr/share/applications/antscope2.desktop

      - name: Download linuxdeploy
        env:
          LINUXDEPLOY_URL: https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          QT_PLUGIN_URL: https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        run: |
          curl -L "$LINUXDEPLOY_URL" -o linuxdeploy-x86_64.AppImage
          curl -L "$QT_PLUGIN_URL" -o linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          QMAKE: /usr/bin/qmake6
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/AntScope2 \
            --desktop-file AppDir/usr/share/applications/antscope2.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/64x64/apps/antscope2.png \
            --plugin qt \
            --output appimage

          mkdir -p dist
          appimage="$(find . -maxdepth 1 -type f -name '*.AppImage' ! -name 'linuxdeploy*.AppImage' | head -n 1)"
          test -n "$appimage"
          ref_name="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::7}"
          mv "$appimage" "dist/AntScope2-${{ matrix.os }}-${ref_name}-${short_sha}-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: AntScope2-AppImage-${{ matrix.os }}
          path: dist/*.AppImage
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release assets
    needs: appimage
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download AppImage artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.AppImage \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.AppImage \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Linux AppImage builds for Ubuntu 22.04 and Ubuntu 24.04."
          fi
